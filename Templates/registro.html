<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Scouting PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen">
    <div class="bg-gray-900 p-8 rounded-xl border border-gray-800 w-96 text-white">
        <h2 class="text-2xl font-bold mb-6 text-center text-green-500">Crear Cuenta</h2>
        <form method="POST" action="/registro" class="space-y-4">
            <input type="text" name="username" placeholder="Nombre de usuario" required class="w-full bg-gray-800 border border-gray-700 p-3 rounded">
            <input type="password" name="password" placeholder="Contraseña" required class="w-full bg-gray-800 border border-gray-700 p-3 rounded">
            <select name="tier" class="w-full bg-gray-800 border border-gray-700 p-3 rounded text-gray-300">
                <option value="Aficionado">Plan Aficionado (€4.99)</option>
                <option value="Profesional">Plan Profesional (€9.99)</option>
                <option value="Clase Mundial">Plan Clase Mundial (€49.99)</option>
            </select>
            <button type="submit" class="w-full bg-green-500 text-black font-bold p-3 rounded hover:bg-green-400">Registrarse</button>
        </form>
    </div>
</body>
</html>
