<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Scouting PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Rajdhani', sans-serif; }</style>
</head>
<body class="bg-gray-950 text-white antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        
        <div class="absolute -top-32 -right-32 w-64 h-64 bg-green-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 pointer-events-none"></div>
        <div class="absolute -bottom-32 -left-32 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <h1 class="text-3xl font-black tracking-tighter mb-2">SCOUTING<span class="text-green-500">PRO</span></h1>
            <p class="text-gray-400 font-bold uppercase tracking-widest text-sm">Alta de Director Deportivo</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-500/10 border border-red-500/50 text-red-500 px-4 py-3 rounded-xl text-sm font-bold mb-6 text-center">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/registro" class="space-y-6 relative z-10">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Nombre Real</label>
                    <input type="text" name="nombre" required class="w-full bg-gray-950 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition-colors font-sans">
                </div>

                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Nombre de Usuario (@)</label>
                    <input type="text" name="username" required placeholder="ej: manager_pro" class="w-full bg-gray-950 border border-gray-700 text-green-400 rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition-colors font-mono">
                </div>

                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Primer Apellido</label>
                    <input type="text" name="apellido1" required class="w-full bg-gray-950 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition-colors font-sans">
                </div>

                <div>
                    <label class="block text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Segundo Apellido (Opcional)</label>
                    <input type="text" name="apellido2" class="w-full bg-gray-950 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition-colors font-sans">
                </div>
            </div>

            <div class="border-t border-gray-800 my-6"></div>

            <div>
                <label class="block text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Correo Electrónico Corporativo</label>
                <input type="email" name="email" required placeholder="correo@ejemplo.com" class="w-full bg-gray-950 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition-colors font-sans">
            </div>

            <div>
                <label class="block text-xs text-gray-500 uppercase font-bold tracking-wider mb-2">Contraseña Segura</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full bg-gray-950 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition-colors font-sans">
                <p class="text-[10px] text-gray-500 mt-2 font-bold uppercase tracking-wide">Debe contener: 8 caracteres, 1 mayúscula, 1 número.</p>
            </div>

            <button type="submit" class="w-full bg-green-500 hover:bg-green-400 text-black font-black uppercase tracking-widest py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(34,197,94,0.3)] mt-4">
                Crear Cuenta y Acceder
            </button>
        </form>
        
        <p class="text-center text-sm text-gray-500 font-bold mt-8">
            ¿Ya tienes licencia? <a href="/login" class="text-green-500 hover:text-green-400 transition-colors">Inicia Sesión</a>
        </p>

    </div>
</body>
</html>
