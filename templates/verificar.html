<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificación de Identidad | Scouting PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Rajdhani', sans-serif; }</style>
</head>
<body class="bg-gray-950 text-white antialiased min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-900 border border-green-500/50 rounded-2xl p-8 shadow-[0_0_40px_rgba(34,197,94,0.1)] relative overflow-hidden text-center">
        
        <div class="w-16 h-16 bg-gray-950 border border-gray-700 rounded-full mx-auto flex items-center justify-center mb-6">
            <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </div>

        <h2 class="text-3xl font-black uppercase tracking-tighter mb-2">Revisa tu correo</h2>
        <p class="text-gray-400 font-sans text-sm mb-8">
            Hemos enviado un código de 6 dígitos a <span class="text-green-400 font-bold">{{ current_user.email }}</span>. Introdúcelo para verificar tu cuenta. (Revisa la carpeta de SPAM).
        </p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-500/10 border border-red-500/50 text-red-500 px-4 py-2 rounded-xl text-sm font-bold mb-6">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/verificacion">
            <input type="text" name="codigo" required maxlength="6" placeholder="000000" class="w-full bg-gray-950 border border-gray-700 text-center text-4xl text-green-400 tracking-[0.5em] rounded-xl px-4 py-4 focus:outline-none focus:border-green-500 transition-colors font-mono mb-6 placeholder:text-gray-800">
            
            <button type="submit" class="w-full bg-green-500 hover:bg-green-400 text-black font-black uppercase tracking-widest py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(34,197,94,0.3)]">
                Confirmar Identidad
            </button>
        </form>
    </div>

</body>
</html>
